<!doctype html>
<html>
<head>

<title>Login - Construction ERP</title>
<link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
<div class="auth-page">

<form>

<input class="input" type="password" placeholder="••••••••" />
<div class="auth-actions">
<label style="display:flex;gap:7px;align-items:center;margin:0;font-weight:400"><input type="checkbox" /> Remember me</label>
<a href="02-forgot-password.html" style="color:#0d7ff2">Forgot password?</a>
</div>
<a class="btn primary" style="width:100%;justify-content:center" href="04-dashboard.html">Sign In</a>
<div style="text-align:center;margin:14px 0" class="small">or</div>
<div class="social">
<button class="btn facebook" type="button">Sign in with Facebook</button>
<button class="btn google" type="button">Sign in with Google</button>
</div>
</form>

    <div style="text-align:center;margin-top:18px" class="small">Need an account? <a href="#" style="color:#0d7ff2">Contact Super Admin</a></div>
  </div>
</div>
